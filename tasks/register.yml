---

- name: Make sure required variables are given
  ansible.builtin.assert:
    that:
      - rhsm_org_id is defined and rhsm_org_id | string | length > 0
      - rhsm_activationkey is defined and rhsm_activationkey | length > 0

- name: Register host to RHSM based on org_id & activationkey
  community.general.redhat_subscription:
    state: present
    activationkey: "{{ rhsm_activationkey }}"
    org_id: "{{ rhsm_org_id }}"
    auto_attach: "{{ rhsm_auto_attach }}"

- name: Enable multiple Red Hat repositories
  community.general.rhsm_repository:
    name: "{{ item }}"
    state: enabled
  loop: "{{ rhsm_repositories }}"
